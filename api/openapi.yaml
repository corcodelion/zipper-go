      - value
    Pagination:
      description: Pagination parameters for controlling result set size and page
        selection
      example:
        pageNumber: 1
        itemsPerPage: 10
      properties:
        itemsPerPage:
          default: 50
          description: Number of items per page. Defaults to 50 if not specified.
          example: 10
          format: int32
          maximum: 1000
          minimum: 1
          type: integer
        pageNumber:
          default: 1
          description: Page number (1-based indexing). Defaults to 1 if not specified.
          example: 1
          format: int32
          minimum: 1
          type: integer
    SearchDeliveriesRequest:
      description: |
        Advanced search request for deliveries with filtering, sorting, and pagination capabilities.
        **Query Fields** (full-text search): `providerTrackingId`, `externalOrderId`
        **Available Filter/Sort Fields:**
        - `status` (HubDeliveryStatus, sortable) - CREATED, ASSIGNED, PICKED_UP, IN_TRANSIT, DELIVERED, CANCELLED, FAILED
        - `deliveryType` (DeliveryType, sortable)
        - `providerType` (DeliveryProviderType, sortable)
        - `createdDate` (Instant, sortable)
        - `userId` (Long, sortable) - Auto-filtered for non-admin users
      example:
        pagination:
          pageNumber: 1
          itemsPerPage: 10
        query: John
        filters:
          key:
          - name: email
            logic: EQ
            value: ""
          - name: email
            logic: EQ
            value: ""
        sort:
        - fieldName: createdDate
          direction: DESC
        - fieldName: createdDate
          direction: DESC
      properties:
        query:
          description: Full-text search query string. Matches against predefined query
            fields using case-insensitive LIKE.
          example: John
          type: string
        filters:
          additionalProperties:
            items:
              $ref: '#/components/schemas/Filter'
          description: Filter groups with AND/OR logic. Each group contains a list
            of filter criteria that are combined using the specified operator.
        sort:
          description: Sort criteria applied in order. Only sortable fields are accepted.
          items:
            $ref: '#/components/schemas/SortField'
          type: array
        pagination:
          $ref: '#/components/schemas/Pagination'
    SortField:
      description: Sort criteria for ordering results
      example:
        fieldName: createdDate
        direction: DESC
      properties:
        fieldName:
          description: Field name to sort by. Must be a sortable field.
          example: createdDate
          type: string
        direction:
          default: asc
          description: Sort direction (case-insensitive)
          enum:
          - ASC
          - asc
          - DESC
          - desc
          example: DESC
          type: string
      required:
      - fieldName
