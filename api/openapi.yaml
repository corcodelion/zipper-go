          example: Courier picked up the order
          type: string
        proofOfDeliveryUrl:
          description: URL to proof-of-delivery image (only for DELIVERED status)
          type: string
    HubHandshakeDeliveryResponse:
      description: Handshake PIN information for a delivery
      example:
        pinCode: 1234
        required: true
      properties:
        required:
          description: Whether a PIN handshake is required for this delivery
          example: true
          type: boolean
        pinCode:
          description: PIN code for the handshake
          example: 1234
          format: int32
          type: integer
    token_request:
      properties:
        grant_type:
          description: OAuth2 grant type (must be 'client_credentials')
          type: string
        client_id:
          description: API client identifier
          type: string
        client_secret:
          description: API client secret key
          type: string
      required:
      - client_id
      - client_secret
      - grant_type
  securitySchemes:
    bearerAuth:
      bearerFormat: JWT
      scheme: bearer
      type: http

