        logic: EQ
        value: ""
      properties:
        name:
          description: Field name to filter on
          example: email
          type: string
        value: {}
        logic:
          description: Filter logic operator to apply
          enum:
          - IN
          - NOT_IN
          - EQ
          - LTE
          - GTE
          - IS_NULL
          - IS_NOT_NULL
          - LIKE
          example: EQ
          type: string
